<!--
    用于MCSManager的Nginx反向代理配置文件生成器

    可以使用的url参数：
        选项（布尔值）：
            https=1
            mergeports=0
            listenipv6=0

        填写内容（字符串）：
        若合并端口，则无需daemonproxyport
            webport=23333
            webproxyport=12333
            daemonport=24444
            daemonproxyport=12444
            domain=domain.com%20*.domain.com
            sslcertpath=/etc/nginx/ssl/_.domain.com.crt
            sslkeypath=/etc/nginx/ssl/_.domain.com_rsa.key

        运行网页时自动生成：
            autogenerate=1
-->

    <title>配置文件生成器</title>
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
</head>
<body>
    <!--<p id="pleaseusechrome" style="color:gray;margin: 0 0 6px;">请使用基于Chrome内核的浏览器，否则界面可能出现错误。</p>-->

    </div>

    <style type="text/css">

    <div id="mydiv" style="display:none;">
        <p style="font-size: 30px; margin: 0;">用于MCSManager的Nginx反向代理配置文件生成器</p>

        <fieldset>
            <legend>选项</legend>
        
            <div>
                <input type="checkbox" id="confCheck_https" name="confCheck_https" checked onclick=clickconfCheck.https() >
                <label for="confCheck_https" >HTTPS</label>
            </div>
        
            <div>
                <input type="checkbox" id="confCheck_mergeports" name="confCheck_mergeports" onclick=clickconfCheck.mergeports()>
                <label for="confCheck_mergeports">合并端口<label for="confCheck_mergeports" style="color:gray;">（通常仅用于web端与daemon端在同一主机的情况）</label></label>
            </div>

            <div>
                <input type="checkbox" id="confCheck_listenipv6" name="confCheck_listenipv6" onclick=clickconfCheck.listenipv6()>

        <fieldset>

            <div id="conf_daemonport">
                <label id="conf_daemonport_title" for="conf_daemonport_input">daemon端监听的端口：</label>

            </div>

            <div id="conf_daemonproxyport">
                <label id="conf_daemonproxyport_title" for="conf_daemonproxyport_input">daemon端代理后的端口：</label>
                <input id="conf_daemonproxyport_input" name="conf_daemonproxyport_input" type="number" min="0" step="1" max="65535" required value="12444"/>

            <div id="conf_domain">
                <label id="conf_domain_title" for="conf_domain_input">域名<label for="conf_domain_input" style="color:gray;">（空格分隔以输入多个，支持通配符）</label>：</label>

            </div>

            <div id="conf_sslcertpath">
                <label id="conf_sslcertpath_title" for="conf_sslcertpath_input">SSL证书路径：</label>
                <input id="conf_sslcertpath_input" name="conf_sslcertpath_input" type="text" size="35" required="" value="/etc/nginx/ssl/_.domain.com.crt" pattern="(^[^*?&quot;<>|]+$)|(^&quot;[^*?&quot;<>|]+&quot;$)">
                <span class="validity"></span>
            </div>

                <label id="conf_sslkeypath_title" for="conf_sslkeypath_input">SSL私钥路径：</label>

        <p style="color:gray; font-size: 14px; margin: 2px 0;">生成URL可用于分享自己填写的参数。如果生成URL之前已经生成配置文件，那么使用生成的URL访问时会自动依据参数生成配置文件。</p>
        <button id="click_generate_url" class="button_generate_url" onclick=generate_url()>生成URL参数</button>

        <button id="click_generate_conf" class="button_generate_conf" onclick=generate_conf()>生成配置文件</button>

<script type="text/javascript">
"use strict";

//String Tools
/**
 * @param {String} inputstr
 * @return {Boolean}
*/
function StrToBool(inputstr){
    if(Number.isNaN(+inputstr)){
        return !(
            ['false','null','NaN','undefined'].includes( inputstr.toLowerCase() )
        );
    }
    return !!(+inputstr);
}


//build Configs class
//必须写成品，否则编辑器不能给出正确的类型。
const ConfS= new class{
    ConfBooleanNameList=[
        'https',
        'mergeports',
        'listenipv6'
    ];
    /**@return {Boolean}*/
    https(){
        return confCheck_https.checked;
    }
    /**@return {Boolean}*/
    mergeports(){
        return confCheck_mergeports.checked;
    }
    /**@return {Boolean}*/
    listenipv6(){
        return confCheck_listenipv6.checked;
    }


    ConfValueNameList=[
        'webport',
        'webproxyport',
        'daemonport',
        'daemonproxyport',
        'domain',
        'sslcertpath',
        'sslkeypath'
    ];
    /**@return {String}*/
    webport(){
        return conf_webport_input.value;
    }
    /**@return {String}*/
    webproxyport(){
        return conf_webproxyport_input.value;
    }
    /**@return {String}*/
    daemonport(){
        return conf_daemonport_input.value;
    }
    /**@return {String}*/
    daemonproxyport(){
        return conf_daemonproxyport_input.value;
    }
    /**@return {String}*/
    domain(){
        return conf_domain_input.value;
    }
    /**@return {String}*/
    sslcertpath(){
        return conf_sslcertpath_input.value;
    }
    /**@return {String}*/
    sslkeypath(){
        return conf_sslkeypath_input.value;
    }

    /**@type {Array<String>}*/
    ConfNameList
};
ConfS.ConfNameList= ConfS.ConfBooleanNameList.concat( ConfS.ConfValueNameList );


//onclick
const clickconfCheck= new class{
    https(){
        console.log('clickconfCheck.https');
        if(ConfS.https()){
            conf_sslcertpath.style.display= '';
            conf_sslkeypath.style.display= '';
        }else{
            conf_sslcertpath.style.display= "none";
            conf_sslkeypath.style.display= "none";
        }
    }
    mergeports(){
        console.log('clickconfCheck.mergeports');
        if(ConfS.mergeports()){
            conf_daemonproxyport.style.display= "none";
            conf_webproxyport_title.innerHTML= "代理后的端口：";
        }else{
            conf_daemonproxyport.style.display= '';
            conf_webproxyport_title.innerHTML= "web端代理后的端口：";
        }
    }
    listenipv6(){
        console.log('clickconfCheck.listenipv6');
    }
};
function generate_url(){
    console.log('generate_url');
    click_generate_url.innerHTML= "重新生成URL参数";
    /**@type {Array<String>}*/
    let urils= [];
    if(generate_conf_runned) urils.push('autogenerate=1');
    for(let i in ConfS.ConfNameList){
        let j= ConfS.ConfNameList[i];
        urils.push(`${j}=${encodeURIComponent( ConfS[j]() )}`);
    }
    let uri= '?'+ urils.join('&');

    console.log(uri);
    if( location.search != uri ) history.pushState("","",uri);
}
function clear_url(){
    console.log('clear_url');
    if(location.search!=''){
        click_generate_url.innerHTML= "生成URL参数";
        history.pushState("","",location.href.replace(location.search,''))
    }
}


//read uri
if( location.search !=='' ){
    console.log('read uri');
    click_generate_url.innerHTML= "重新生成URL参数";

    let params = (new URL(document.location)).searchParams;
    let i;

    for(let i in ConfS.ConfBooleanNameList){
        let j= ConfS.ConfBooleanNameList[i];
        //console.log(j);
        let k= params.get(j);
        //console.log(k);
        if(k !== null){
            try{
                this['confCheck_'+j].checked= StrToBool(k);
                clickconfCheck[j]();
            }catch(e){
                console.error(e);
            }
        }
    }

    for(let i in ConfS.ConfValueNameList){
        let j= ConfS.ConfValueNameList[i];
        //console.log(j);
        let k= params.get(j);
        //console.log(k);
        if(k !== null){
            try{
                this[`conf_${j}_input`].value= k;
            }catch(e){
                console.error(e);
            }
        }
    }

    let autogenerate= false;
    i= params.get('autogenerate');
    if(i !== null) autogenerate= StrToBool(i);
    if(autogenerate) generate_conf();
}


//定义生成配置文件的函数
var generate_conf_runned= false;
function generate_conf(){
    console.log('generate_conf');
    generate_conf_runned= true;
    //generate_info.innerHTML ="正在生成配置文件，请稍候";
    //generate_info.style= "color:gray;";
    click_generate_conf.innerHTML= "重新生成配置文件";
    //let generate_conf_time_start= Date.now();
    try{
        //验证填写信息有效
        /**
         * @param {String} port
         * @param {String} E
         * @throws {String}
        */
        function porttest(port,E){
            if(!(/^[0-9]{1,5}$/.test(port) && Number(port)>=0 && Number(port)<=65535)) throw E;
        }
        /**
         * @param {String} INPUT
         * @param {String} E
         * @throws {String}
        */
        function sslpathtest(INPUT,E){
            if( !(new RegExp(INPUT.pattern) ).test(INPUT.value)) throw E;
        }
        
        porttest(ConfS.webport(), 'web端监听端口格式无效');
        porttest(ConfS.webproxyport(), 'web端代理后的端口格式无效');
        porttest(ConfS.daemonport(), 'daemon端监听端口格式无效');
        if(!(ConfS.mergeports())) porttest(ConfS.daemonproxyport(), 'daemon端代理后的端口格式无效');

        //使用数组去重检测端口号冲突
        {//有临时变量，括起来
            let testportsarray=[
                ConfS.webport(),
                ConfS.webproxyport(),
                ConfS.daemonport()
            ];
            if( !(ConfS.mergeports()) ) testportsarray.push( ConfS.daemonproxyport() );
            //console.log(testportsarray);
            if(testportsarray.length > (new Set(testportsarray)).size) throw '端口号不能重复';

            if(ConfS.https()){
                sslpathtest(conf_sslcertpath_input, 'SSL证书路径格式无效');
                sslpathtest(conf_sslkeypath_input, 'SSL私钥路径格式无效');
            }

            let test_domains_array= ConfS.domain().split(' ');
            for(let i in test_domains_array){
                let j= test_domains_array[i].toLowerCase();
                if(j == 'localhost') throw '不能填写 localhost 域名';
                if(j.includes('**')) throw '不能有多个 * 连在一起';
                if(j.includes('..')) throw '不能有多个 . 连在一起';
                if(j.includes('--')) throw '不能有多个 - 连在一起';
            }
        }

        //检查完毕，开始进行字符串连接
        const buildconf= [];

        //缓存备用
        //ssl目录
            /**
             * @param {String} VALUE
             * @return {String}
            */
            function correctionFilePath(VALUE){
                let path= VALUE.replaceAll('\\','/');
                if(/^\"(.+)\"$/.test(path)) return path;
                return `"${path}"`;
            }
            const buildconf_sslcertpath= correctionFilePath(ConfS.sslcertpath());
            const buildconf_sslkeypath= correctionFilePath(ConfS.sslkeypath());
        //daemon端口
            const buildconf_daemonport= (
                ()=>{
                    if(ConfS.mergeports()) return ConfS.webproxyport();
                    return ConfS.daemonproxyport();
                }
            )();
        //ssl或default
            const [
                buildconf_sslORdefault, 
                buildconf_sslORnone
            ]=(
                ()=>{
                    if(ConfS.https()) return ['ssl','ssl '];
                    return ['default','']
                }
            )();
        //ipv6 listen
            /**
             * @param {String} ipv6
             * @param {String|Number} port
             * @return {String}
            */
            function buildconf_ipv6listen(ipv6, port){
                if(ConfS.listenipv6()) return `        listen [${ipv6}]:${port} ${buildconf_sslORnone};\n`;
                return '';
            }
            /**
             * @param {String} ipv6
             * @param {String|Number} port
             * @return {String}
            */
            function buildconf_ipv6listendefault(ipv6, port){
                if(ConfS.listenipv6()) return `        listen [${ipv6}]:${port} ${buildconf_sslORdefault};\n`;
                return '';
            }
        //listen
            /**
             * @param {String} ipv4
             * @param {String} ipv6
             * @param {String|Number} port
             * @return {String}
            */
            function buildconf_listen(ipv4,ipv6,port){
                return `${buildconf_ipv6listen(ipv6, port)}        listen ${ipv4+port} ${buildconf_sslORnone};`
            }
            /**
             * @param {String} ipv4
             * @param {String} ipv6
             * @param {String|Number} port
             * @return {String}
            */
            function buildconf_listendefault(ipv4,ipv6,port){
                return `${buildconf_ipv6listendefault(ipv6, port)}        listen ${ipv4+port} ${buildconf_sslORdefault};`
            }

        //ssl证书
        if(ConfS.https()){
            buildconf.push(
`    # 配置SSL证书。以下监听的ssl端口将默认使用该证书。
    #SSL-START
    ssl_certificate ${buildconf_sslcertpath};
    ssl_certificate_key ${buildconf_sslkeypath};

    ssl_session_cache shared:SSL:1m;
    ssl_session_timeout  10m;
    ssl_protocols TLSv1.2; # 仅允许使用TLSv1.2建立连接
    ssl_verify_client off; # 不验证客户端的证书
    #SSL-END

`);
        }
        //gzip
        buildconf.push(
`    # 传输时默认开启gzip压缩
    gzip on;
    # 传输时会被压缩的类型（应当依据文件压缩效果添加）
    gzip_types text/plain text/css application/javascript application/xml application/json;
    # 反向代理时，启用压缩
    gzip_proxied any;
    # 传输时压缩等级，等级越高压缩消耗CPU越多，最高9级，通常5级就够了
    gzip_comp_level 5;
    # 传输时大小达到1k才压缩，压缩小内容无意义
    gzip_min_length 1k;

    # 响应头中的server仅返回nginx，不返回版本号。
    server_tokens  off;

    # 不限制客户端上传文件大小
    client_max_body_size 0;

    server {
        # 这块是用于阻止跨域访问的。

`);



        //防跨域模块
        if(ConfS.mergeports()){
            buildconf.push(
`        # 代理后端口（可用多个listen监听多个端口）
${buildconf_listendefault('','::',ConfS.webproxyport())}

`);
        }else{
            buildconf.push(
`        # Daemon 端访问端口（可用多个listen监听多个端口）
${buildconf_listendefault('','::',ConfS.daemonproxyport())}
        # Web面板访问端口（可用多个listen监听多个端口）
${buildconf_listendefault('','::',ConfS.webproxyport())}
`);
        }
        buildconf.push(
`        # 若使用的域名在其它server{}中都无法匹配，则会匹配这里。
        server_name _ ;

`);
        if(ConfS.https()){
            buildconf.push(
`        # 使用https访问时，直接断开连接，不返回证书。
        # 如果你需要套DNS的CDN高防，则不应该删除此块，那样更容易导致证书泄露，攻击者扫到IP后直接将源IP与域名绑定在一起。
        ssl_reject_handshake on;

        # 使用HTTP访问时，断开连接。
        error_page 497 =200 /;
        location / {
            return 444;
        }
    }
`);
        }else{
            buildconf.push(
`        # 断开连接。
        return 444;
    }
`);
        }



        //localhost块
        buildconf.push(
`    server {
        # Daemon 端代理后的localhost访问HTTP协议端口（可用多个listen监听多个端口）
${(ConfS.listenipv6()) ? (`        listen [::1]:${buildconf_daemonport} ;\n`) : ''}        listen 127.0.0.1:${buildconf_daemonport} ;

        # 本地回环域名
        server_name localhost ;

        # 本地回环地址不占宽带，无需压缩。
        gzip off;

        # 开始反向代理
        location / {
            # 填写Daemon进程真正监听的端口号
            proxy_pass http://localhost:${ConfS.daemonport()} ;

            # 一些请求头
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header REMOTE-HOST $remote_addr;
            # 用于WebSocket的必要请求头
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            # 增加响应头
